<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HORIKITA66 // космос</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #050814, #000000);
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* ========== КОСМИЧЕСКИЙ ФОН С АНИМАЦИЕЙ ========== */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* слой со звёздами (мелкие) */
        .stars-small {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 15% 30%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 72% 18%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 45% 68%, #f8f3ff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 88% 92%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 34% 12%, #ffe6b0, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 5% 85%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 95% 45%, #cfd0ff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 60% 50%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 25% 75%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 80% 15%, #ffefb0, rgba(0,0,0,0));
            background-size: 350px 350px;
            background-repeat: repeat;
            opacity: 0.8;
            animation: driftSlow 180s linear infinite;
        }

        /* слой с крупными звёздами (мерцают) */
        .stars-large {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 10% 20%, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 2px at 65% 45%, #fffaf0, rgba(0,0,0,0)),
                radial-gradient(2px 3px at 35% 80%, #ffe6b0, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 92% 35%, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 48% 92%, #fff, rgba(0,0,0,0));
            background-size: 400px 400px;
            background-repeat: repeat;
            opacity: 0.9;
            animation: twinkle 3s ease-in-out infinite alternate, driftFast 120s linear infinite;
        }

        /* туманность (облака) */
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(80, 60, 220, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(200, 60, 150, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 45% 85%, rgba(30, 150, 200, 0.1) 0%, transparent 50%);
            filter: blur(60px);
            animation: nebulaPulse 15s ease-in-out infinite;
        }

        /* анимации */
        @keyframes driftSlow {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(-60px) translateY(-40px); }
        }

        @keyframes driftFast {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(-100px) translateY(-60px); }
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        @keyframes nebulaPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* ========== ОСНОВНОЙ КОНТЕНТ ========== */
        .container {
            position: relative;
            z-index: 20;
            max-width: 480px;
            width: 100%;
            background: rgba(6, 8, 18, 0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(120, 100, 240, 0.4);
            border-radius: 56px;
            padding: 2.5rem 1.8rem;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
        }

        .container:hover {
            border-color: rgba(150, 120, 255, 0.7);
            transform: scale(1.01);
        }

        .icon {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #1e1a35, #0a0818);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 1px solid #6f5bef;
            box-shadow: 0 0 16px rgba(100, 80, 255, 0.3);
            transition: all 0.2s ease;
            animation: iconGlow 3s ease-in-out infinite;
        }

        @keyframes iconGlow {
            0%, 100% { box-shadow: 0 0 16px rgba(100, 80, 255, 0.3); }
            50% { box-shadow: 0 0 28px rgba(140, 110, 255, 0.6); }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #c2baff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .role {
            color: #9aa9e0;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin: 1rem 0 1.8rem 0;
            border-bottom: 1px dashed #4f46e5;
            display: inline-block;
            padding-bottom: 6px;
        }

        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #10162e;
            border: 1px solid #6c5ce7;
            border-radius: 80px;
            padding: 0.9rem 1.5rem;
            width: 100%;
            max-width: 280px;
            margin: 0.6rem auto;
            text-decoration: none;
            font-weight: 600;
            color: white;
            transition: all 0.25s ease;
        }

        .link-button:hover {
            background: #6c5ce7;
            border-color: #a08eff;
            transform: translateY(-2px);
            gap: 14px;
        }

        .footer {
            margin-top: 1.8rem;
            font-size: 0.6rem;
            color: #5470b0;
            border-top: 1px solid rgba(100, 80, 200, 0.3);
            padding-top: 1rem;
        }

        @media (max-width: 550px) {
            .container {
                padding: 1.8rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .link-button {
                font-size: 0.85rem;
                padding: 0.7rem 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- космический фон с анимацией -->
    <div class="space-bg">
        <div class="stars-small"></div>
        <div class="stars-large"></div>
        <div class="nebula"></div>
    </div>

    <div class="container">
        <div class="icon">🎨</div>
        <h1>HORIKITA66</h1>
        <div class="role">designer & admin — Fear Of God</div>

        <a href="https://t.me/+YEaQ5lYiFy4yZDIy" target="_blank" class="link-button">✦ FEAR OF GOD CHAT ✦</a>
        <a href="https://t.me/XOPNKNTA" target="_blank" class="link-button">► TELEGRAM: @XOPNKNTA</a>

        <div class="footer">official · HORIKITA66</div>
    </div>
</body>
</html>
