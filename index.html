        body {

            background: radial-gradient(ellipse at 30% 40%, #050814, #000);
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(6, 8, 18, 0.65);

            padding: 2.5rem 1.8rem;
            text-align: center;
        }
        .icon {
            width: 80px;

            display: flex;

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #c2baff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .role {
            color: #9aa9e0;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin: 1rem 0 1.8rem 0;
            border-bottom: 1px dashed #4f46e5;
            display: inline-block;
            padding-bottom: 6px;
        }
        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #10162e;
            border: 1px solid #6c5ce7;
            border-radius: 80px;
            padding: 0.9rem 1.5rem;
            width: 100%;
            max-width: 280px;
            margin: 0.6rem auto;
            text-decoration: none;
            font-weight: 600;
            color: white;
        }
        .footer {
            margin-top: 1.8rem;
            font-size: 0.6rem;
            color: #5470b0;
            border-top: 1px solid rgba(100, 80, 200, 0.3);
